<!-- src/app/shared/barcode-scanner/barcode-scanner.html -->

<div class="w-full">

  <!-- Escáner activo -->
  @if (scanning()) {
    <div class="scanner-container mb-3">
      <video #video autoplay playsinline muted></video>
      <div class="scan-line"></div>
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
    </div>
    <p class="text-center text-xs text-gray-500 mb-3">
      Apunta la cámara al código de barras
    </p>
  }

  <!-- Error -->
  @if (error()) {
    <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 mb-3">
      <p class="text-red-600 text-xs">{{ error() }}</p>
    </div>
  }

  <!-- Botón cancelar -->
  <button
    type="button"
    (click)="onCancel()"
    class="w-full py-2.5 rounded-xl text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors"
  >
    Cancelar
  </button>

</div>
