<!-- src/app/features/installation/steps/extra-data/extra-data.html -->

<form [formGroup]="form" (ngSubmit)="onSubmit()">

  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">
      Observaciones <span class="text-gray-400 font-normal">(opcional)</span>
    </label>
    <textarea
      formControlName="observations"
      placeholder="Ej: El cliente solicitó instalación en segundo piso..."
      rows="5"
      class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none"
    ></textarea>
  </div>

  <!-- Botones -->
  <div class="flex gap-3 mt-8">
    <button
      type="button"
      (click)="onGoBack()"
      class="w-1/3 py-3 rounded-xl text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors"
    >
      Volver
    </button>
    <button
      type="submit"
      class="w-2/3 py-3 rounded-xl text-sm font-semibold bg-blue-600 text-white hover:bg-blue-700 transition-colors"
    >
      Continuar
    </button>
  </div>

</form>
